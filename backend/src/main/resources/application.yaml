spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobradar
    username: postgres
    password: ${DB_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

google:
  client-id: ${GOOGLE_CLIENT_ID}

app:
  upload-dir: uploads/

